name: Deploy SimpleBank 

on: 
 workflow_call: 

permissions: 
  id-token: write 
  contents: read

env:
  VERSION: v1
  REGION: us-west-1
  ECR: 972293797085.dkr.ecr.us-west-1.amazonaws.com
  IMAGE: 972293797085.dkr.ecr.us-west-1.amazonaws.com/flaskapp-simple-bank
  S3_BUCKET: s3://972293797085-devops-scripts

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ysanskarr7/Banking-app-2-tier
          ref: main

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::972293797085:role/github-deploy-policy
          aws-region: ${{ env.REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.REGION }} | \
          docker login --username AWS --password-stdin ${{ env.ECR }}

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ env.VERSION }} .
          docker push ${{ env.IMAGE }}:${{ env.VERSION }}

      - name: Upload docker-compose to S3
        run: |
          aws s3 cp docker-compose.yml ${{ env.S3_BUCKET }}/docker-compose.yml --region ${{ env.REGION }}

      - name: Deploy via SSM
        id: deploy
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ env.VERSION }} by ${{ github.actor }}" \
            --parameters '{"commands":[
              "set -e",
              "aws ecr get-login-password --region ${{ env.REGION }} | docker login --username AWS --password-stdin ${{ env.ECR }}",
              "mkdir -p /home/ubuntu/app",
              "aws s3 cp ${{ env.S3_BUCKET }}/docker-compose.yml /home/ubuntu/app/docker-compose.yml",
              "docker pull ${{ env.IMAGE }}:${{ env.VERSION }}",
              "docker stop simplebank 2>/dev/null || true",
              "docker rm simplebank 2>/dev/null ||  true",
              "cd /home/ubuntu/app && IMAGE_TAG=${{ env.VERSION }} docker compose up -d",
              "docker ps --filter name=simplebank --format {{.Status}} | grep -q Up && echo CONTAINER_RUNNING  (echo CONTAINER_FAILED && exit 1)"
            ]}' \
            --query 'Command.CommandId' \
            --output text \
            --region ${{ env.REGION }})

          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT

      - name: Verify Deployment
        run: |
          for i in {1..10}; do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "${{ steps.deploy.outputs.cmd_id }}" \
              --query "CommandInvocations[*].Status" \
              --output text \
              --region ${{ env.REGION }})

            echo "[$i] Status: $STATUS"
            echo "$STATUS" | grep -q "InProgress\|Pending" && sleep 10 || break
          done

          echo "============ DEPLOY RESULTS ============"

          aws ssm list-command-invocations \
            --command-id "${{ steps.deploy.outputs.cmd_id }}" \
            --details \
            --region ${{ env.REGION }} \
            --query "CommandInvocations[*].[InstanceId,Status,CommandPlugins[0].Output]" \
            --output text | while IFS=$'\t' read -r instance status output; do
              echo "Instance : $instance"
              echo "Status   : $status"
              echo "$output" | tail -5
              echo "----------------------------------------"
            done

          FAILED=$(aws ssm list-command-invocations \
            --command-id "${{ steps.deploy.outputs.cmd_id }}" \
            --query "length(CommandInvocations[?Status=='Failed'])" \
            --output text \
            --region ${{ env.REGION }})

          [ "$FAILED" -gt 0 ] && \
            echo "::error::Deploy failed on $FAILED instance(s)!" && \
            exit 1

          echo "✅ Deploy successful — ${{ env.VERSION }}"